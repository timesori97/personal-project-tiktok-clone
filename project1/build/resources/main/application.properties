# 1. Database Connection (Oracle)
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
# localhost:1521:xe 부분은 본인의 DB 주소와 SID(보통 xe 또는 orcl)에 맞게 수정하세요.
spring.datasource.url=jdbc:oracle:thin:@localhost:1521:orcl
spring.datasource.username=system
spring.datasource.password=1111

# 2. MyBatis Settings
# XML 매퍼 파일의 위치를 지정합니다. (src/main/resources/mapper 폴더 기준)
mybatis.mapper-locations=classpath:mapper/**/*.xml
# SQL 결과 데이터를 담을 자바 객체(DTO/VO)의 패키지 경로를 지정하면 편리합니다.
mybatis.type-aliases-package=com.example.project1.model

# 3. Log Settings (SQL 쿼리를 콘솔에서 확인하고 싶을 때)
logging.level.com.example.project1.mapper=debug