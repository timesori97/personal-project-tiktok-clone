# 1. Database Connection (Oracle)
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
# localhost:1521:xe 부분은 본인의 DB 주소와 SID(보통 xe 또는 orcl)에 맞게 수정하세요.
spring.datasource.url=jdbc:oracle:thin:@localhost:1521:orcl
spring.datasource.username=system
spring.datasource.password=1111

# 2. MyBatis Settings
# XML 파일 위치를 스프링에게 알려줍니다.
mybatis.mapper-locations=classpath:mapper/**/*.xml
# XML에서 resultType을 짧게 쓰기 위한 설정입니다.
mybatis.type-aliases-package=com.example.project1.model

# 3. Log Settings (SQL 쿼리를 콘솔에서 확인하고 싶을 때)
logging.level.com.example.project1.mapper=debug

# 4. File Upload Settings
# 반드시 C 드라이브에 upload/tiktok 폴더를 직접 만들어 두세요!
file.upload-dir=D:/upload/tiktok/
# 개별 파일 하나당 최대 크기 (1GB)
spring.servlet.multipart.max-file-size=1GB

# 한 번의 요청(파일+텍스트 데이터 전체)에 포함된 최대 크기
spring.servlet.multipart.max-request-size=1GB